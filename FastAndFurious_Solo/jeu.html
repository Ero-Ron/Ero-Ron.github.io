    <script type="module">

        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "abe8ce1fdcc4b6e0ca42330fa5d81945",
            authDomain: "movieguessr-48add.firebaseapp.com",
            projectId: "movieguessr-48add",
            storageBucket: "movieguessr-48add.firebasestorage.app",
            messagingSenderId: "571793295589",
            appId: "1:571793295589:web:ed3a7a930a97ff65776c0c",
            measurementId: "G-WR8SF76SFZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function saveScore(pseudo, score) {

            await addDoc(collection(db, "scores"), {
                nom: pseudo,
                score: score,
                date: Date.now()
            });

        }
    </script>

            { titre: "Jumanji: Welcome to the Jungle", annee: 2017 },
            { titre: "Jumanji", annee: 1995 },

            { titre: "Inception", annee: 2010 },
            { titre: "Dead Poets Society", annee: 1989 },
            { titre: "The Lion King", annee: 1994 },
            { titre: "Jurassic Park", annee: 1993 },
            { titre: "The Perks of Being a Wallflower", annee: 2012 },
            { titre: "Deadpool", annee: 2016 },
            { titre: "It", annee: 2017 },

            { titre: "Finding Nemo", annee: 2003 },
            { titre: "Jaws", annee: 1975 },
            { titre: "Paranormal Activity", annee: 2007 },
            { titre: "A Minecraft Movie", annee: 2025 },
            { titre: "Frozen", annee: 2013 },
            { titre: "The Chronicles of Narnia: The Lion, the Witch and the Wardrobe", annee: 2005 },
            { titre: "The Terminator", annee: 1984 },
            { titre: "Scream", annee: 1996 },
            { titre: "Kingsman: The Secret Service", annee: 2014 },
            { titre: "Black Swan", annee: 2010 }];

        films.forEach((film, i) => {
            film.flou = `${i + 1}.png`;
            film.affiche = `${i + 1}.png`;
        });
        const min = 0;
        const max = films.length - 1;

        const reviewImage = document.getElementById("image-review");

        function getRandom(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function quiz() {
            currentIndex = getRandom(min, max);
            if (dejutil.includes(currentIndex)) {
                quiz();
            } else {
                dejutil.push(currentIndex);
            }
        }

        function delai(x, cb) {
            setTimeout(cb, x);
        }

        // Choisir la première image aléatoire dès le début
        quiz();
        reviewImage.src = "../Image/review/" + (currentIndex + 1) + ".png";

        // Event sur le bouton
        const buttonsearch = document.querySelector("button");
        buttonsearch.addEventListener("click", (event) => {
            event.preventDefault();
            reponseUtilisateur = document.getElementById("input").value;

            if (reponseUtilisateur === films[currentIndex].titre) {
                point.textContent = parseFloat(point.textContent) + ajout;
                const goodSound = new Audio("../Son/Good.mp3");
                goodSound.play();
                indice3.innerHTML = `<img src="../Image/affiche/${films[currentIndex].affiche}" style="width:250px; border-radius:10px;">`
                delai(2000, () => {
                    quiz();
                    reviewImage.src = "../Image/review/" + (currentIndex + 1) + ".png";
                    document.getElementById("input").value = "";
                    indice1.textContent = ""
                    indice2.textContent = ""
                    indice3.textContent = "?"
                    util1 = false
                    util2 = false
                    util3 = false
                    ajout = 5
                })

            } else {
                const badSound = new Audio("../Son/Bad.mp3");
                badSound.play();
                document.getElementById("input").value = "";
            }
        });

        let tempo = document.getElementById("time");
        let minute = 10
        let seconde = 0

        tempo.textContent = minute + ":" + (seconde < 10 ? "0" + seconde : seconde);

        async function temps() {
            if (minute === 0 && seconde === 0) {
                localStorage.setItem("dernierScore", point.textContent);
                window.location.href = "finfast.html";
                return;
            }

            if (seconde > 0) {
                seconde -= 1;
            } else {
                seconde = 59;
                minute -= 1;
            }

            tempo.textContent = minute + ":" + (seconde < 10 ? "0" + seconde : seconde);
        }
        setInterval(temps, 1000);


        const ind1 = document.getElementById("ind1")
        ind1.addEventListener("click", (event) => {
            event.preventDefault();
            reponseUtilisateur = document.getElementById("ind1").value;
            let indice1 = document.getElementById("indice1")

            if (util1 == false) {
                indice1.textContent = films[currentIndex].annee;
                ajout -= 0.5;
                util1 = true;
            }

        });

        const ind2 = document.getElementById("ind2")
        ind2.addEventListener("click", (event) => {
            event.preventDefault();
            reponseUtilisateur = document.getElementById("ind2").value;
            let indice1 = document.getElementById("indice2")

            if (util2 == false) {
                tiret(films[currentIndex].titre)
                ajout -= 1;
                util2 = true;
            }

        })

        function tiret(text) {
            let mot = ""
            for (let i = 0; i < text.length; i++) {
                if (text[i] == " ") {
                    mot += "&nbsp;&nbsp;&nbsp;&nbsp;";
                } else {
                    mot += "_ ";
                }
            }
            indice2.innerHTML = mot;
        }
        const ind3 = document.getElementById("ind3")
        ind3.addEventListener("click", (event) => {
            event.preventDefault();
            reponseUtilisateur = document.getElementById("ind3").value;
            let indice3 = document.getElementById("indice3")
            if (util3 == false) {
                indice3.innerHTML = `<img src="../Image/flou/${films[currentIndex].flou}" style="width:250px; border-radius:10px;">`
                ajout -= 2.5;
                util3 = true;
            }
        })

        collBtn = document.getElementById("skip")

        collBtn.addEventListener("click", function () {
            indice3.innerHTML = `<img src="../Image/affiche/${films[currentIndex].affiche}" style="width:250px; border-radius:10px;">`;
            badSound.play();
            let totalSeconds = minute * 60 + seconde;
            totalSeconds -= 20;
            if (totalSeconds < 0) totalSeconds = 0;

            minute = Math.floor(totalSeconds / 60);
            seconde = totalSeconds % 60;
            ajout = 5
            delai(2000, () => {
                quiz();
                reviewImage.src = "../Image/review/" + (currentIndex + 1) + ".png";
                document.getElementById("input").value = "";
                indice1.textContent = ""
                indice2.textContent = ""
                indice3.textContent = "?"
                util1 = false
                util2 = false
                util3 = false
            })

        })


        //  --------------------------------------------------- API -------------------------------------------------------------------

        input.addEventListener("input", function () {
            let texte = input.value.trim();
            if (texte.length < 3) {
                suggestions.innerHTML = "";
                return;
            }

            const apiKey = "abe8ce1fdcc4b6e0ca42330fa5d81945";
            const url = `https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&query=${encodeURIComponent(texte)}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    suggestions.innerHTML = ""; // vider les anciennes suggestions

                    data.results.slice(0, 3).forEach(film => { // 3 suggestions max
                        let div = document.createElement("div");
                        div.textContent = film.title; // le titre du film TMDB
                        div.classList.add("suggestion");
                        div.style.cursor = "pointer";
                        div.style.padding = "5px";
                        div.style.borderBottom = "1px solid #9CED47";
                        div.style.marginBottom = "3px";

                        // remplir l'input quand on clique
                        div.addEventListener("click", () => {
                            input.value = film.title;
                            suggestions.innerHTML = "";
                        });

                        suggestions.appendChild(div);
                    });
                })
                .catch(error => console.error("Erreur API :", error));


        });





    </script>
